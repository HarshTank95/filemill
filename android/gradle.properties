org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Pub cache (C:) and project (D:) are on different drives; Kotlin incremental
# compilation cannot relativize paths across roots and fails closing its caches.
kotlin.incremental=false
# receive_sharing_intent 1.8.1 compiles Java at 1.8 but Kotlin at 21; mixed
# class-file versions dex fine, so relax the strict jvm-target validation.
kotlin.jvm.target.validation.mode=warning
